[tools]
node = "22"
pnpm = "9.15.9"

[tasks.install]
description = "install dependencies"
run = "pnpm install"

[tasks.dev]
description = "start dev server"
run = "pnpm turbo dev"

[tasks.build]
description = "build all packages"
run = "pnpm turbo build"

[tasks.lint]
description = "lint all packages"
run = "pnpm turbo lint"

[tasks.format]
description = "format all packages"
run = "pnpm turbo format"

[tasks.typecheck]
description = "typecheck all packages"
run = "pnpm turbo typecheck"

[tasks."db:up"]
description = "start local postgres database"
run = "docker compose up -d db"

[tasks."db:down"]
description = "stop local postgres database"
run = "docker compose down"

[tasks."db:logs"]
description = "show postgres database logs"
run = "docker compose logs -f db"

[tasks."db:reset"]
description = "destroy postgres database and its data"
run = "docker compose down -v"
