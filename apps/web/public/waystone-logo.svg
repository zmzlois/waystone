<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" fill="black">
  <!-- asteroid / waystone rock -->
  <g transform="translate(90, 100)">
    <!-- main rock body — irregular jagged polygon -->
    <path d="
      M -45 -30
      L -30 -52
      L -8  -58
      L 18  -50
      L 38  -42
      L 50  -20
      L 48   5
      L 42  28
      L 30  42
      L 10  48
      L -15  44
      L -38  32
      L -50  12
      L -52 -10
      Z
    " />
    <!-- surface cracks and craters -->
    <path d="M -20 -30 L -8 -12 L 5 -25" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" />
    <path d="M 20 -20 L 28 -5 L 18 8" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" />
    <path d="M -30 10 L -18 18 L -25 30" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" />
    <!-- small crater -->
    <ellipse cx="5" cy="10" rx="8" ry="6" fill="none" stroke="white" stroke-width="2" />
    <!-- debris chunks floating off -->
    <polygon points="-58,-40 -52,-48 -44,-42 -48,-35" />
    <polygon points="55,-28 62,-32 60,-22" />
    <polygon points="50,35 58,30 56,40" />
    <polygon points="-55,25 -60,18 -50,16" />
    <!-- tiny fragments -->
    <circle cx="-62" cy="-25" r="2.5" />
    <circle cx="65" cy="-10" r="2" />
    <circle cx="-48" cy="38" r="2" />
    <circle cx="52" cy="-40" r="1.8" />
  </g>

  <!-- "Waystone" text -->
  <text
    x="170"
    y="120"
    font-family="JetBrains Mono, monospace"
    font-weight="600"
    font-size="72"
    letter-spacing="2"
  >Waystone</text>
</svg>
